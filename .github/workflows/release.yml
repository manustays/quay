name: Release

# Fully automated releases via semantic-release.
#
# Push a Conventional Commit to main (feat: / fix: / perf: …) and this workflow
# computes the next version from commit history, writes it into the project
# files, builds the universal macOS .dmg, creates the git tag, and publishes a
# GitHub Release with the asset attached — no manual tag, bump, or publish.
# Commits that warrant no release (docs:/chore:/test:/refactor with no user
# impact) run the analysis and exit without building.
#
# Signing/notarization is automatic when a COMPLETE set of Apple secrets is
# configured (see docs/packaging.md); otherwise the build is unsigned. Nothing
# to change in this file to switch it on.

on:
  push:
    branches: [main]

# Don't pile up release runs; let an in-flight one finish.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # create releases, push the version-bump commit + tag
  issues: write # semantic-release success/fail comments
  pull-requests: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # semantic-release needs full history + tags
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22 # semantic-release requires >= 22.14
          cache: npm

      - name: Setup Rust (with universal targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri updater signing — REQUIRED for auto-update. The bundler emits the
          # .app.tar.gz.sig only when the private key is present; scripts/make-latest-json.mjs
          # aborts the release if the signature is missing. See docs/auto-update.md.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple signing/notarization — optional. scripts/release-build.sh
          # builds unsigned unless BOTH the cert and signing identity are set.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
